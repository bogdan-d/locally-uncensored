name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Third-party actions are pinned to a full commit SHA (not a moving tag) so a
# compromised or retagged upstream release can't silently run in our CI with
# secrets in scope. The trailing comment records the human-readable version.
# To bump: resolve the new tag to its SHA (`gh api repos/<owner>/<repo>/commits/<tag> --jq .sha`).
jobs:
  lint-and-build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      # Historical debt: the repo carries ~170 files of pre-existing lint
      # errors (unused test vars, no-explicit-any in old suites) that predate
      # 2.5.7 — lint has been red since April. Keep it visible but non-gating
      # until the debt is paid down; tsc + vitest + build are the real gates.
      - name: Lint (non-gating — pre-existing debt)
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Build frontend
        run: npm run build

  e2e:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # The harness stubs the Tauri IPC in-page (e2e/support/tauri-mock.ts) —
      # no Rust sidecar, Ollama or ComfyUI processes needed.
      - name: Playwright e2e (Tauri-mocked)
        run: npm run test:e2e

  cargo-check:
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: [ubuntu-22.04, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev

      # tauri-build's copy_binaries HARD-FAILS from build.rs when a declared
      # externalBin file is missing — cargo check needs the sidecar file to
      # EXIST, not to work. Stub it so the check doesn't pay a 20-min llama
      # build; the real binaries are built in release.yml + sidecar-windows.yml.
      - name: Stub llama-server sidecar for cargo check
        shell: bash
        run: |
          mkdir -p src-tauri/bin
          triple="$(rustc -vV | awk '/^host:/{print $2}')"
          case "$triple" in
            *-windows-*) touch "src-tauri/bin/llama-server-$triple.exe" ;;
            *)           touch "src-tauri/bin/llama-server-$triple" ;;
          esac
          ls -la src-tauri/bin/

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check
